name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — no leading v)'
        required: true
        type: string

jobs:
  build-raycast:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Raycast extension
        run: |
          cd raycast
          npm ci
          npx ray build -o dist-release --non-interactive
          cd ..
          tar -czf bufo-raycast.tar.gz -C raycast/dist-release .

      - name: Upload Raycast asset
        uses: actions/upload-artifact@v4
        with:
          name: bufo-raycast
          path: bufo-raycast.tar.gz

  release:
    needs: build-raycast
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the version-bump commit can be pushed to main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in x.y.z format (got: ${{ inputs.version }})"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in common.sh
        run: |
          sed -i 's/^VERSION=.*/VERSION="${{ inputs.version }}"/' src/lib/common.sh
          grep '^VERSION=' src/lib/common.sh  # confirm the change

      - name: Commit and tag
        run: |
          git add src/lib/common.sh
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Build release assets
        run: |
          cp src/bufo bufo
          chmod +x bufo

          # Bundle lib directory (extracts as lib/ relative to install dir)
          tar -czf bufo-lib.tar.gz -C src lib

          # Build daemon and bundle dist/ + package.json into a tarball
          cd daemon
          npm ci
          npm run build
          cd ..
          tar -czf bufo-daemon.tar.gz -C daemon dist package.json

          # Generate SHA256 checksums
          sha256sum bufo > bufo.sha256
          sha256sum bufo-lib.tar.gz > bufo-lib.tar.gz.sha256
          sha256sum bufo-daemon.tar.gz > bufo-daemon.tar.gz.sha256
          sha256sum install.sh > install.sh.sha256

      - name: Download Raycast asset
        uses: actions/download-artifact@v4
        with:
          name: bufo-raycast

      - name: Checksum Raycast asset
        run: sha256sum bufo-raycast.tar.gz > bufo-raycast.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            install.sh
            install.sh.sha256
            bufo
            bufo.sha256
            bufo-lib.tar.gz
            bufo-lib.tar.gz.sha256
            bufo-daemon.tar.gz
            bufo-daemon.tar.gz.sha256
            bufo-raycast.tar.gz
            bufo-raycast.tar.gz.sha256
          generate_release_notes: true
