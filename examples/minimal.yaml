# Example: Minimal Configuration
# Bare minimum config to get started
#
# Tip: Add command aliases in ~/.bufo/config.yaml:
#   aliases:
#     cu: cleanup
#     r: restart
#     wn: spawn

session_name: dev
tadpole_base: ~/Dev/my-project/tadpoles
main_repo: ~/Dev/my-project

tadpoles:
  count: 3
  prefix: tp
  branch_pattern: tadpole-{N}

ports:
  api_base: 3000
  app_base: 5000

layout:
  panes:
    - name: terminal
      command: ""
    - name: server
      command: ""
    - name: main
      command: ""

